name: thehive-platform

# Phase 1 Docker Compose for TheHive re-platform.
# Boots Postgres, RabbitMQ, Go backend, and Next.js frontend with healthchecks
# wired so that dependents only start once dependencies are healthy.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    labels: "service,version,git_sha"

services:
  postgres:
    image: postgres:16-alpine
    container_name: thehive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thehive}
      POSTGRES_USER: ${POSTGRES_USER:-thehive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thehive}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thehive} -d ${POSTGRES_DB:-thehive}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    networks:
      - thehive-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: thehive-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-thehive}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-thehive}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - thehive-net

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: thehive-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    logging: *default-logging
    networks:
      - thehive-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: thehive-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-thehive}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-thehive-secret}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    networks:
      - thehive-net

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: thehive-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-thehive} ${MINIO_ROOT_PASSWORD:-thehive-secret} &&
      mc mb --ignore-existing local/${S3_BUCKET:-thehive-attachments} &&
      mc anonymous set public local/${S3_BUCKET:-thehive-attachments}"
    logging: *default-logging
    networks:
      - thehive-net

  backend:
    image: ${BACKEND_IMAGE:-thehive-platform-backend:0.4.0-migration}
    container_name: thehive-backend
    restart: unless-stopped
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.4.0-migration}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      opensearch:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_DISABLED: ${RATE_LIMIT_DISABLED:-true}
      HTTP_ADDR: :8080
      POSTGRES_DSN: postgres://${POSTGRES_USER:-thehive}:${POSTGRES_PASSWORD:-thehive}@postgres:5432/${POSTGRES_DB:-thehive}?sslmode=disable
      POSTGRES_MIGRATIONS_PATH: file:///app/migrations
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-thehive}:${RABBITMQ_PASSWORD:-thehive}@rabbitmq:5672/
      RABBITMQ_CONNECT_TIMEOUT: 60s
      RABBITMQ_RECONNECT_BACKOFF: 5s
      JWT_SECRET: ${JWT_SECRET:-please-change-me-please-change-me-32+}
      JWT_EXPIRY: 1h
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      REQUEST_TIMEOUT: 30s
      INVESTIGATION_DATA_SOURCE: ${INVESTIGATION_DATA_SOURCE:-postgres}
      LEGACY_THEHIVE_URL: ${LEGACY_THEHIVE_URL:-}
      LEGACY_THEHIVE_API_KEY: ${LEGACY_THEHIVE_API_KEY:-}
      LEGACY_THEHIVE_TIMEOUT: ${LEGACY_THEHIVE_TIMEOUT:-10s}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-thehive@localhost}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-thehive}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-thehive-secret}
      S3_BUCKET: ${S3_BUCKET:-thehive-attachments}
      S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-true}
      S3_UPLOAD_TTL: ${S3_UPLOAD_TTL:-15m}
      S3_DOWNLOAD_TTL: ${S3_DOWNLOAD_TTL:-5m}
      ATTACHMENT_SCANNER_ENGINE: ${ATTACHMENT_SCANNER_ENGINE:-placeholder}
      ATTACHMENT_DOWNLOAD_POLICY: ${ATTACHMENT_DOWNLOAD_POLICY:-clean-only}
      ATTACHMENT_QUEUE_ON_UPLOAD: ${ATTACHMENT_QUEUE_ON_UPLOAD:-true}
      ATTACHMENT_MANUAL_SCAN_ALLOW: ${ATTACHMENT_MANUAL_SCAN_ALLOW:-true}
      ATTACHMENT_ZIP_PASSWORD: ${ATTACHMENT_ZIP_PASSWORD:-malware}
      # MISP integration
      MISP_ENABLED: ${MISP_ENABLED:-false}
      MISP_URL: ${MISP_URL:-}
      MISP_API_KEY: ${MISP_API_KEY:-}
      MISP_TIMEOUT: ${MISP_TIMEOUT:-30s}
      MISP_VERIFY_TLS: ${MISP_VERIFY_TLS:-true}
      MISP_SYNC_ENABLED: ${MISP_SYNC_ENABLED:-false}
      MISP_SYNC_INTERVAL: ${MISP_SYNC_INTERVAL:-15m}
      # Cortex integration
      CORTEX_ENABLED: ${CORTEX_ENABLED:-false}
      CORTEX_URL: ${CORTEX_URL:-}
      CORTEX_API_KEY: ${CORTEX_API_KEY:-}
      CORTEX_TIMEOUT: ${CORTEX_TIMEOUT:-30s}
      CORTEX_POLL_INTERVAL: ${CORTEX_POLL_INTERVAL:-30s}
      CORTEX_BATCH_SIZE: ${CORTEX_BATCH_SIZE:-5}
      CORTEX_MAX_JOB_WAIT: ${CORTEX_MAX_JOB_WAIT:-5m}
      # Notification worker
      NOTIFICATION_WORKER_ENABLED: ${NOTIFICATION_WORKER_ENABLED:-true}
      NOTIFICATION_WORKER_POLL_INTERVAL: ${NOTIFICATION_WORKER_POLL_INTERVAL:-10s}
      NOTIFICATION_WORKER_BATCH_SIZE: ${NOTIFICATION_WORKER_BATCH_SIZE:-20}
      # OpenSearch
      OPENSEARCH_ENABLED: ${OPENSEARCH_ENABLED:-true}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_INDEX_PREFIX: ${OPENSEARCH_INDEX_PREFIX:-thehive}
      SHUTDOWN_GRACE_PERIOD: 15s
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - thehive-net

  frontend:
    image: ${FRONTEND_IMAGE:-thehive-platform-frontend:0.4.0-migration}
    container_name: thehive-frontend
    restart: unless-stopped
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.4.0-migration}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_PROXY_TARGET: http://backend:8080
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - thehive-net

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: thehive-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "${OPENSEARCH_PERF_PORT:-9600}:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - thehive-net

volumes:
  postgres-data:
  rabbitmq-data:
  minio-data:
  opensearch-data:

networks:
  thehive-net:
    driver: bridge
