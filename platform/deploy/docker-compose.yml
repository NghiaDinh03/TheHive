name: thehive-platform

# Phase 1 Docker Compose for TheHive re-platform.
# Boots Postgres, RabbitMQ, Go backend, and Next.js frontend with healthchecks
# wired so that dependents only start once dependencies are healthy.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    labels: "service,version,git_sha"

services:
  postgres:
    image: postgres:16-alpine
    container_name: thehive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thehive}
      POSTGRES_USER: ${POSTGRES_USER:-thehive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thehive}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thehive} -d ${POSTGRES_DB:-thehive}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    networks:
      - thehive-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: thehive-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-thehive}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-thehive}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - thehive-net

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: thehive-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    logging: *default-logging
    networks:
      - thehive-net

  backend:
    image: ${BACKEND_IMAGE:-thehive-platform-backend:0.4.0-migration}
    container_name: thehive-backend
    restart: unless-stopped
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.4.0-migration}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_ADDR: :8080
      POSTGRES_DSN: postgres://${POSTGRES_USER:-thehive}:${POSTGRES_PASSWORD:-thehive}@postgres:5432/${POSTGRES_DB:-thehive}?sslmode=disable
      POSTGRES_MIGRATIONS_PATH: file:///app/migrations
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-thehive}:${RABBITMQ_PASSWORD:-thehive}@rabbitmq:5672/
      RABBITMQ_CONNECT_TIMEOUT: 60s
      RABBITMQ_RECONNECT_BACKOFF: 5s
      JWT_SECRET: ${JWT_SECRET:-please-change-me-please-change-me-32+}
      JWT_EXPIRY: 1h
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      REQUEST_TIMEOUT: 30s
      INVESTIGATION_DATA_SOURCE: ${INVESTIGATION_DATA_SOURCE:-postgres}
      LEGACY_THEHIVE_URL: ${LEGACY_THEHIVE_URL:-}
      LEGACY_THEHIVE_API_KEY: ${LEGACY_THEHIVE_API_KEY:-}
      LEGACY_THEHIVE_TIMEOUT: ${LEGACY_THEHIVE_TIMEOUT:-10s}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-thehive@localhost}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      SHUTDOWN_GRACE_PERIOD: 15s
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - thehive-net

  frontend:
    image: ${FRONTEND_IMAGE:-thehive-platform-frontend:0.4.0-migration}
    container_name: thehive-frontend
    restart: unless-stopped
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.4.0-migration}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_PROXY_TARGET: http://backend:8080
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    networks:
      - thehive-net

volumes:
  postgres-data:
  rabbitmq-data:

networks:
  thehive-net:
    driver: bridge
