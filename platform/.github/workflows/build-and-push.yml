name: build-and-push

on:
  push:
    branches: [ main ]
    tags:    [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NS: ${{ vars.IMAGE_NS || 'thehiveplatform' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4

      - name: Set version metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF##refs/tags/}"
          else
            APP_VERSION="0.4.0-migration"
          fi
          GIT_SHA="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GIT_SHA}"         >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}"   >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: platform/backend
          file:    platform/backend/Dockerfile
          push:    ${{ github.event_name != 'pull_request' }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app_version }}
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/backend:${{ steps.meta.outputs.app_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/backend:${{ steps.meta.outputs.app_version }}-${{ steps.meta.outputs.git_sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: platform/frontend
          file:    platform/frontend/Dockerfile
          push:    ${{ github.event_name != 'pull_request' }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app_version }}
            GIT_SHA=${{ steps.meta.outputs.git_sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/frontend:${{ steps.meta.outputs.app_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/frontend:${{ steps.meta.outputs.app_version }}-${{ steps.meta.outputs.git_sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend
